services:
  app:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - NODE_ENV=test
    command: ["npm", "run", "evaluate"]

  test:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - NODE_ENV=test
    command: ["npm", "run", "test"]

  evaluation:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - NODE_ENV=test
    command: ["npm", "run", "evaluate"]