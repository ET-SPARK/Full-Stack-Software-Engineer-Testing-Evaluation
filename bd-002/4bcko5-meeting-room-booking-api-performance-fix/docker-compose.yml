version: '3.8'

services:
  # Single shared database
  db:
    image: postgres:15-alpine
    container_name: booking-api-db
    environment:
      POSTGRES_DB: booking_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - booking-network

  # Before version server (unoptimized)
  server-before:
    build:
      context: ./repository_before
      dockerfile: ../Dockerfile.server
    container_name: booking-api-server-before
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: booking_system
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5000
      JWT_SECRET: booking-secret-key
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - booking-network

  # After version server (optimized)
  server-after:
    build:
      context: ./repository_after
      dockerfile: ../Dockerfile.server
    container_name: booking-api-server-after
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: booking_system
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5001
      JWT_SECRET: booking-secret-key
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - booking-network

  # Test runner for BEFORE version
  test-before:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-api-test-before
    environment:
      API_URL: http://server-before:5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: booking_system
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - server-before
    networks:
      - booking-network
    volumes:
      - ./evaluation:/app/evaluation
    command: ["sh", "-c", "sleep 15 && echo '\n=== TESTING BEFORE VERSION (Unoptimized) ===\n' && npm test"]

  # Test runner for AFTER version
  test-after:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-api-test-after
    environment:
      API_URL: http://server-after:5001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: booking_system
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - server-after
    networks:
      - booking-network
    volumes:
      - ./evaluation:/app/evaluation
    command: ["sh", "-c", "sleep 15 && echo '\n=== TESTING AFTER VERSION (Optimized) ===\n' && npm test"]

  # Evaluation runner (tests both and compares)
  evaluate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-api-evaluate
    environment:
      API_URL_BEFORE: http://server-before:5000
      API_URL_AFTER: http://server-after:5001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: booking_system
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - server-before
      - server-after
    networks:
      - booking-network
    volumes:
      - ./evaluation:/app/evaluation
    command: ["sh", "-c", "sleep 15 && echo '\n=== RUNNING FULL EVALUATION ===\n' && npm run evaluate && echo '\n=== Results saved to evaluation/results.json ===\n'"]

volumes:
  postgres_data:

networks:
  booking-network:
    driver: bridge
